services:

  gestion-guias:

    build: .

    container_name: gestion-guias

    ports:
      - "8080:8080"

    environment:
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}

    volumes:
      - ./storage:/app/efs