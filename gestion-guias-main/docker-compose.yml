services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: guias-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guias}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guias-local}
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  productor:
    build:
      context: ./ms-productor-guias
    image: ms-productor-guias:local
    container_name: ms-productor-guias
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guias}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guias-local}
      AZURE_B2C_JWK_SET_URI: ${AZURE_B2C_JWK_SET_URI}
      AZURE_B2C_ISSUER_URI: ${AZURE_B2C_ISSUER_URI}
      AZURE_B2C_AUDIENCE: ${AZURE_B2C_AUDIENCE}
    ports:
      - "8080:8080"

  consumidor:
    build:
      context: ./ms-consumidor-guias
    image: ms-consumidor-guias:local
    container_name: ms-consumidor-guias
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guias}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guias-local}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      STORAGE_PATH: /tmp/storage
      AZURE_B2C_JWK_SET_URI: ${AZURE_B2C_JWK_SET_URI}
      AZURE_B2C_ISSUER_URI: ${AZURE_B2C_ISSUER_URI}
      AZURE_B2C_AUDIENCE: ${AZURE_B2C_AUDIENCE}
    ports:
      - "8081:8081"

volumes:
  rabbitmq-data:
