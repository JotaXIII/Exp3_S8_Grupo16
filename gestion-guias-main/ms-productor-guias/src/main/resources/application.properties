spring.application.name=gestion-guias

server.port=8080

spring.datasource.url=jdbc:h2:mem:guiasdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Seguridad OAuth2
security.oauth2.jwk-set-uri=${AZURE_B2C_JWK_SET_URI:https://gestionguiasgrupo16.b2clogin.com/gestionguiasgrupo16.onmicrosoft.com/B2C_1_1_signupsignin/discovery/v2.0/keys}
security.oauth2.issuer-uri=${AZURE_B2C_ISSUER_URI:https://gestionguiasgrupo16.b2clogin.com/tfp/fa29ef4f-f0db-41c7-b132-8bb21fe905ba/b2c_1_1_signupsignin/v2.0/}
security.oauth2.audience=${AZURE_B2C_AUDIENCE:ffcb0203-f967-4ae3-a623-a2b7e611d127}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true
