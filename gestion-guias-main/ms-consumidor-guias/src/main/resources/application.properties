# Aplicacion

spring.application.name=ms-consumidor-guias
server.port=${SERVER_PORT:8081}

# H2

spring.datasource.url=jdbc:h2:mem:guiasconsumidordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# RabbitMQ

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.prefetch=1

# Procesamiento de archivos

storage.path=${STORAGE_PATH:storage}

# AWS S3

aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:gestion-guias-grupo16}

# Seguridad OAuth2

security.oauth2.jwk-set-uri=${AZURE_B2C_JWK_SET_URI:https://gestionguiasgrupo16.b2clogin.com/gestionguiasgrupo16.onmicrosoft.com/B2C_1_1_signupsignin/discovery/v2.0/keys}
security.oauth2.issuer-uri=${AZURE_B2C_ISSUER_URI:https://gestionguiasgrupo16.b2clogin.com/tfp/fa29ef4f-f0db-41c7-b132-8bb21fe905ba/b2c_1_1_signupsignin/v2.0/}
security.oauth2.audience=${AZURE_B2C_AUDIENCE:ffcb0203-f967-4ae3-a623-a2b7e611d127}
